<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم للأكاديمية | د. دينا خالد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #050a30; --gold: #c5a059; --glass: rgba(255, 255, 255, 0.95); }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #050a30 0%, #000c66 100%); 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .container {
            background: var(--glass); padding: 50px; border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%; max-width: 500px; position: relative; border: 1px solid rgba(255,255,255,0.2);
        }
        .container::before {
            content: ""; position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
            width: 150px; height: 10px; background: var(--gold); border-radius: 0 0 15px 15px;
        }
        h1 { color: var(--primary); font-weight: 900; font-size: 2.2rem; text-align: center; margin-bottom: 5px; }
        .subtitle { color: var(--gold); text-align: center; font-weight: bold; margin-bottom: 40px; display: block; }
        .input-field { margin-bottom: 25px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: #333; }
        input { 
            width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 15px; 
            font-family: 'Cairo'; font-size: 1rem; background: #f9f9f9;
        }
        input:focus { border-color: var(--gold); outline: none; background: #fff; box-shadow: 0 0 15px rgba(197, 160, 89, 0.2); }
        .btn { 
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; 
            border-radius: 15px; font-size: 1.2rem; font-weight: 900; cursor: pointer; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); background: #000c66; }
        .footer-link { text-align: center; margin-top: 25px; }
        a { color: var(--primary); text-decoration: none; font-weight: 900; }
    </style>
</head>
<body>
    <div class="container">
        <h1>أكاديمية المحاسبة</h1>
        <span class="subtitle">تحت إشراف د. دينا خالد</span>
        <div class="input-field">
            <label>الاسم الثلاثي</label>
            <input type="text" id="name" placeholder="أدخل اسمك بالكامل">
        </div>
        <div class="input-field">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>
        <div class="input-field">
            <label>كلمة المرور</label>
            <input type="password" id="pass" placeholder="••••••••••••">
        </div>
        <button class="btn" onclick="register()">إنشاء الحساب الآن</button>
        <div class="footer-link">لديك حساب؟ <a href="login.html">سجل دخول من هنا</a></div>
    </div>
    <script>
        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            if(!name || !email || !password) return alert('برجاء ملء البيانات');

            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            if(data.success) { alert('✨ تم التسجيل! أهلاً بك في الأكاديمية'); window.location.href = 'login.html'; }
            else { alert(data.message); }
        }
    </script>
</body>
</html>
