<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الطلاب | د. دينا خالد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #1a237e; --bg: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: white; width: 100%; max-width: 400px; padding: 45px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: var(--main); margin-bottom: 30px; font-weight: 900; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; font-family: 'Cairo'; }
        button { width: 100%; padding: 16px; background: var(--main); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 1.1rem; }
        button:hover { background: #0d1642; }
        a { color: var(--main); text-decoration: none; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>دخول الطلاب 🎓</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="handleLogin()">دخول للمحاضرات</button>
        <div style="margin-top: 20px;">
            ليس لديك حساب؟ <a href="index.html">اضغط هنا للتسجيل</a>
        </div>
    </div>
    <script>
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', data.name);
                window.location.href = 'dashboard.html';
            } else {
                alert(data.message);
            }
        }
    </script>
</body>
</html>
