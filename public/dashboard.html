<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة المحاضرات | الأكاديمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #050a30; --gold: #c5a059; --bg: #f4f6f9; }
        body { font-family: 'Cairo', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        
        /*Sidebar*/
        .sidebar { width: 400px; background: white; border-left: 2px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 40px; background: var(--primary); color: white; text-align: center; }
        .sidebar-header h2 { margin: 0; font-weight: 900; font-size: 1.8rem; }
        .sidebar-header p { margin: 10px 0 0; color: var(--gold); font-weight: bold; }
        
        .playlist { flex: 1; overflow-y: auto; padding: 20px; }
        .video-item { 
            padding: 25px; margin-bottom: 15px; background: #fff; border: 1px solid #eee; 
            border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .video-item:hover { transform: scale(1.03); border-color: var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .video-item.active { background: #050a30; color: white; border-color: var(--primary); }

        /*Main Content*/
        .main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .video-frame { 
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 30px; 
            overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        iframe { width: 100%; height: 100%; border: none; }
        .details { margin-top: 40px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .details h1 { color: var(--primary); font-weight: 900; margin: 0; }
        .logout { background: #d9534f; color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-family: 'Cairo'; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>د. دينا خالد</h2>
            <p id="welcomeMsg"></p>
        </div>
        <div class="playlist" id="vids">
            <div class="video-item active" onclick="play('https://www.youtube.com/embed/tgbNymZ7vqY', 'أساسيات المحاسبة المالية', this)">
                <strong>المحاضرة 1</strong><br><small>مقدمة في العلم المحاسبي</small>
            </div>
            <div class="video-item" onclick="play('https://www.youtube.com/embed/dQw4w9WgXcQ', 'تحليل القوائم المالية', this)">
                <strong>المحاضرة 2</strong><br><small>كيفية قراءة الميزانية</small>
            </div>
        </div>
    </div>
    <div class="main">
        <div class="nav">
            <span style="font-weight: 900; color: var(--primary);">📍 منصة التعلم الذكي</span>
            <button class="logout" onclick="logout()">خروج آمن</button>
        </div>
        <div class="video-frame">
            <iframe id="player" src="https://www.youtube.com/embed/tgbNymZ7vqY" allowfullscreen></iframe>
        </div>
        <div class="details">
            <h1 id="vTitle">أساسيات المحاسبة المالية</h1>
            <p style="color: #666; font-size: 1.1rem; line-height: 1.8; margin-top: 20px;">
                مرحباً بك في المحاضرة. يرجى التركيز في النقاط الجوهرية التي تطرحها الدكتورة دينا.
            </p>
        </div>
    </div>
    <script>
        if(!localStorage.getItem('isLoggedIn')) window.location.href = 'login.html';
        document.getElementById('welcomeMsg').innerText = "مرحباً يا " + localStorage.getItem('userName').split(' ')[0];

        function play(url, title, el) {
            document.getElementById('player').src = url;
            document.getElementById('vTitle').innerText = title;
            document.querySelectorAll('.video-item').forEach(v => v.classList.remove('active'));
            el.classList.add('active');
        }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
